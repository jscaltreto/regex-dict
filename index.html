<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{{title}}</title>
    <meta name="description" content="{{description}}" />

    <!-- Canonical -->
    <link rel="canonical" href="{{url}}" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{url}}" />
    <meta property="og:title" content="{{title}}" />
    <meta property="og:description" content="{{description}}" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:url" content="{{url}}" />
    <meta name="twitter:title" content="{{title}}" />
    <meta name="twitter:description" content="{{description}}" />

    <!-- JSON-LD Structured Data -->
    <!--web-app-schema-->

    <!-- FAQ Structured Data -->
    <!--faq-schema-->
  </head>
  <body>
    <div id="app"></div>
    <noscript>
      <h1>{{name}}</h1>
      <p>Search 275,000+ English words with a regular expression. This free online regex dictionary lets you find words matching any pattern — perfect for crosswords, Scrabble, word games, puzzles, and linguistics research.</p>
      <p>This tool requires JavaScript to run. Please enable JavaScript in your browser.</p>
    </noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
